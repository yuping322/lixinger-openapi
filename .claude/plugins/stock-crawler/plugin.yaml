name: "stock-crawler"
version: "1.0.0"
owner: "TBD"
pack: "Pack D"
business_domain: "Data Acquisition"
description: "Website-first research crawling plugin for non-API, high-timeliness, and unstructured investment data"
dependencies: []
default_command: "crawler-submit"
commands:
  - name: "submit-crawl-task"
    description: "提交爬取任务"
    file: "commands/submit-crawl-task.md"
  - name: "check-crawl-progress"
    description: "检查爬取进度"
    file: "commands/check-crawl-progress.md"
  - name: "analyze-crawl-results"
    description: "分析爬取结果"
    file: "commands/analyze-crawl-results.md"
  - name: "run-crawl-task"
    description: "直接运行爬取"
    file: "commands/run-crawl-task.md"
status: "active"
created_at: "2026-04-12"
updated_at: "2026-04-12"
external_scripts:
  - path: ".claude/stock-crawler/src/index.js"
    description: "Crawler CLI 入口"
  - path: ".claude/stock-crawler/src/template-pipeline-cli.js"
    description: "配置生成工具"
  - path: ".claude/stock-crawler/config/"
    description: "站点配置文件目录"
environment_variables:
  - name: "CRAWLER_HOME"
    description: "Crawler 核心目录路径，默认为 .claude/stock-crawler"
    default: ".claude/stock-crawler"