provider_key: finnhub
display_name: Finnhub
kind: market_data
status: active
auth:
  type: env_only
  env_vars:
    - FINNHUB_API_KEY
capabilities:
  - us_equity_market_data
  - us_equity_fundamental
  - global_equity_market_data
entrypoints:
  smoke_test:
    command: "python3 test_datasource.py --source finnhub"
  query:
    command: "python3 test_datasource.py --source finnhub --symbol AAPL"
docs:
  primary_index: finnhub-api-docs/SKILL.md
limits:
  rate_limit_notes: "Free tier: 60 calls/minute"
provenance:
  api_base_url: https://finnhub.io/api/v1/
