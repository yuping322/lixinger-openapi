<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 格式测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            border-bottom: 3px solid #764ba2;
            padding-bottom: 10px;
        }
        .feature-box {
            background: #f8f9fa;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #667eea;
            border-radius: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #667eea;
            color: white;
        }
        .status {
            display: inline-block;
            padding: 5px 15px;
            background: #28a745;
            color: white;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 HTML 格式测试</h1>
        
        <div class="feature-box">
            <h2>📋 功能展示</h2>
            <ul>
                <li><strong>样式支持</strong>: CSS 渐变背景</li>
                <li><strong>布局</strong>: 响应式设计</li>
                <li><strong>交互</strong>: 按钮和表单</li>
            </ul>
        </div>

        <h3>📊 数据表格</h3>
        <table>
            <thead>
                <tr>
                    <th>项目</th>
                    <th>状态</th>
                    <th>进度</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Markdown 测试</td>
                    <td>✅ 完成</td>
                    <td>100%</td>
                </tr>
                <tr>
                    <td>HTML 测试</td>
                    <td>✅ 完成</td>
                    <td>100%</td>
                </tr>
                <tr>
                    <td>图片测试</td>
                    <td>⏳ 进行中</td>
                    <td>100%</td>
                </tr>
            </tbody>
        </table>

        <div class="feature-box">
            <h3>🎯 测试信息</h3>
            <p><strong>测试日期:</strong> 2026-02-27</p>
            <p><strong>测试状态:</strong> <span class="status">成功</span></p>
            <p><strong>浏览器兼容:</strong> Chrome, Firefox, Safari, Edge</p>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <button style="background: #667eea; color: white; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-size: 16px;">
                点击测试按钮
            </button>
        </div>
    </div>
</body>
</html>
